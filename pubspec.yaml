# pubspec.yaml - ADD DEPENDENCIES
name: explore_world
description: A modern tourism app for exploring destinations

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.3
  google_sign_in: ^6.1.5
  flutter_facebook_auth: ^7.1.0
  shared_preferences: ^2.2.2
  flutter_localizations: # ADD THIS
    sdk: flutter
  intl: ^0.19.0 # ADD THIS

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true # ADD THIS for code generation

  assets:
    -  assets/images/
    -  assets/locales/

flutter_intl: # ADD THIS SECTION
  enabled: true
  main_locale: en